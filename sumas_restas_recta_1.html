<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumas y Restas en la Recta Numérica</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 16px;
        }
        
        .ejercicio {
            background: #f8f9ff;
            border-left: 5px solid #667eea;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 10px;
            transition: transform 0.2s;
        }
        
        .ejercicio:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.1);
        }
        
        .ejercicio-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .ejercicio-numero {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }
        
        .operacion {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            background: white;
            padding: 8px 16px;
            border-radius: 8px;
            border: 2px solid #667eea;
        }
        
        .recta-container {
            background: white;
            padding: 25px 10px;
            border-radius: 10px;
            margin: 15px 0;
            overflow-x: auto;
        }
        
        svg {
            display: block;
            margin: 0 auto;
            width: 100%;
            min-height: 150px;
        }
        
        .opciones {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 15px;
            justify-content: center;
        }
        
        .numero-btn {
            width: 45px;
            height: 45px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s;
            color: #333;
        }
        
        .numero-btn:hover {
            transform: scale(1.1);
            border-color: #667eea;
            color: #667eea;
        }
        
        .numero-btn.correcto {
            background: #10b981;
            border-color: #10b981;
            color: white;
        }
        
        .numero-btn.incorrecto {
            background: #ef4444;
            border-color: #ef4444;
            color: white;
        }
        
        .feedback {
            margin-top: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            display: none;
        }
        
        .feedback.correcto {
            color: #10b981;
            display: block;
        }
        
        .feedback.incorrecto {
            color: #ef4444;
            display: block;
        }
        
        .botones-finales {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 40px;
        }
        
        button.btn {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-resultados {
            background: #667eea;
            color: white;
        }
        
        .btn-resultados:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .btn-reiniciar {
            background: #764ba2;
            color: white;
        }
        
        .btn-reiniciar:hover {
            background: #653a89;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.3);
        }
        
        .puntuacion {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            margin-top: 30px;
            display: none;
        }
        
        .puntuacion h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .puntuacion p {
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 Sumas y Restas</h1>
        <p class="subtitle">¡Resuelve con los dibujos en la recta numérica!</p>
        
        <div id="ejercicios-container"></div>
        
        <div class="botones-finales">
            <button class="btn btn-resultados" onclick="mostrarResultados()">Ver Mis Resultados</button>
            <button class="btn btn-reiniciar" onclick="generarNuevosEjercicios()">Nuevos Ejercicios</button>
        </div>
        
        <div class="puntuacion" id="puntuacion">
            <h2>¡Felicidades!</h2>
            <p id="puntuacion-texto"></p>
        </div>
    </div>

    <script>
        // Dibujos disponibles
        const dibujosDisponibles = [
            { dibujo: "🍎", descripcion: "manzanas" },
            { dibujo: "🐠", descripcion: "peces" },
            { dibujo: "🌟", descripcion: "estrellas" },
            { dibujo: "🍭", descripcion: "dulces" },
            { dibujo: "🦋", descripcion: "mariposas" },
            { dibujo: "🌸", descripcion: "flores" },
            { dibujo: "🧸", descripcion: "osos" },
            { dibujo: "🍌", descripcion: "plátanos" },
            { dibujo: "🎈", descripcion: "globos" },
            { dibujo: "🐢", descripcion: "tortugas" },
            { dibujo: "⭐", descripcion: "soles" },
            { dibujo: "🍒", descripcion: "cerezas" },
            { dibujo: "🌈", descripcion: "arcos iris" },
            { dibujo: "🦆", descripcion: "patos" },
            { dibujo: "🎨", descripcion: "colores" },
            { dibujo: "🍓", descripcion: "fresas" },
            { dibujo: "🌻", descripcion: "girasoles" },
            { dibujo: "🦋", descripcion: "mariposas" },
            { dibujo: "🐝", descripcion: "abejas" },
            { dibujo: "🐞", descripcion: "mariquitas" },
            { dibujo: "🍎", descripcion: "manzanas" },
            { dibujo: "🍊", descripcion: "naranjas" },
            { dibujo: "🍋", descripcion: "limones" },
            { dibujo: "🍌", descripcion: "plátanos" },
            { dibujo: "🐠", descripcion: "peces" },
            { dibujo: "🦑", descripcion: "pulpos" },
            { dibujo: "🦐", descripcion: "camarones" },
            { dibujo: "🐙", descripcion: "pulpitos" },
            { dibujo: "🎨", descripcion: "colores" },
            { dibujo: "🎭", descripcion: "máscaras" }
        ];

        // Función para generar números aleatorios
        function generarEjercicios() {
            const ejercicios = [];
            const dibujosUsados = new Set();
            
            // 7 ejercicios de suma
            for (let i = 0; i < 7; i++) {
                const num1 = Math.floor(Math.random() * 6) + 1; // 1 a 6
                const num2 = Math.floor(Math.random() * 6) + 1; // 1 a 6
                
                // Asegurar que la suma no exceda 10
                if (num1 + num2 <= 10) {
                    let dibujo;
                    do {
                        dibujo = dibujosDisponibles[Math.floor(Math.random() * dibujosDisponibles.length)];
                    } while (dibujosUsados.has(dibujo.descripcion));
                    dibujosUsados.add(dibujo.descripcion);
                    
                    ejercicios.push({
                        tipo: "suma",
                        num1: num1,
                        num2: num2,
                        dibujo: dibujo.dibujo,
                        descripcion: dibujo.descripcion
                    });
                } else {
                    i--; // Reintentar si la suma excede 10
                }
            }
            
            // 8 ejercicios de resta
            for (let i = 0; i < 8; i++) {
                const num1 = Math.floor(Math.random() * 6) + 5; // 5 a 10
                const num2 = Math.floor(Math.random() * (num1 - 1)) + 1; // 1 a num1-1
                
                let dibujo;
                do {
                    dibujo = dibujosDisponibles[Math.floor(Math.random() * dibujosDisponibles.length)];
                } while (dibujosUsados.has(dibujo.descripcion));
                dibujosUsados.add(dibujo.descripcion);
                
                ejercicios.push({
                    tipo: "resta",
                    num1: num1,
                    num2: num2,
                    dibujo: dibujo.dibujo,
                    descripcion: dibujo.descripcion
                });
            }
            
            return ejercicios;
        }
        
        const ejercicios = generarEjercicios();

        let respuestas = {};

        function calcularRespuesta(operacion) {
            if (operacion.tipo === "suma") {
                return operacion.num1 + operacion.num2;
            } else {
                return operacion.num1 - operacion.num2;
            }
        }

        function crearRecta(operacion, idx, mostrarSolucion = false) {
            const color = operacion.tipo === "suma" ? "#667eea" : "#f97316";
            const respuesta = calcularRespuesta(operacion);
            
            let svg = `<svg viewBox="0 0 650 140" xmlns="http://www.w3.org/2000/svg">`;
            
            // Línea principal
            svg += `<line x1="50" y1="70" x2="600" y2="70" stroke="#333" stroke-width="3"/>`;
            
            // Números (0-10)
            for (let i = 0; i <= 10; i++) {
                const x = 50 + (i * 55);
                svg += `<circle cx="${x}" cy="70" r="6" fill="#333"/>`;
                svg += `<text x="${x}" y="105" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">${i}</text>`;
            }
            
            // Solo mostrar dibujos y curvas si la respuesta es correcta
            if (mostrarSolucion && respuestas[idx] === respuesta) {
                if (operacion.tipo === "suma") {
                    const x1 = 50 + (operacion.num1 * 55);
                    const x2 = 50 + ((operacion.num1 + operacion.num2) * 55);
                    
                    // Arcos para los saltos
                    for (let i = 0; i < operacion.num2; i++) {
                        const xInicio = 50 + ((operacion.num1 + i) * 55);
                        const xFin = 50 + ((operacion.num1 + i + 1) * 55);
                        const yArco = 30 - (i * 8);
                        svg += `<path d="M ${xInicio} 70 Q ${(xInicio + xFin) / 2} ${yArco}, ${xFin} 70" 
                                stroke="${color}" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;
                        
                        // Flecha
                        svg += `<polygon points="${xFin},70 ${xFin - 6},66 ${xFin - 4},74" fill="${color}"/>`;
                    }
                    
                    svg += `<text x="${x1}" y="25" text-anchor="middle" font-size="24">${operacion.dibujo}</text>`;
                    svg += `<text x="${x1}" y="50" text-anchor="middle" font-size="14" fill="#666">${operacion.num1}</text>`;
                    svg += `<text x="${x2 + 30}" y="45" font-size="16" fill="${color}" font-weight="bold">+${operacion.num2}</text>`;
                } else {
                    const x1 = 50 + (operacion.num1 * 55);
                    const x2 = 50 + ((operacion.num1 - operacion.num2) * 55);
                    
                    // Arcos para los saltos hacia atrás
                    for (let i = 0; i < operacion.num2; i++) {
                        const xInicio = 50 + ((operacion.num1 - i) * 55);
                        const xFin = 50 + ((operacion.num1 - i - 1) * 55);
                        const yArco = 30 - (i * 8);
                        svg += `<path d="M ${xInicio} 70 Q ${(xInicio + xFin) / 2} ${yArco}, ${xFin} 70" 
                                stroke="${color}" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;
                        
                        // Flecha hacia atrás
                        svg += `<polygon points="${xFin},70 ${xFin + 6},66 ${xFin + 4},74" fill="${color}"/>`;
                    }
                    
                    svg += `<text x="${x1}" y="25" text-anchor="middle" font-size="24">${operacion.dibujo}</text>`;
                    svg += `<text x="${x1}" y="50" text-anchor="middle" font-size="14" fill="#666">${operacion.num1}</text>`;
                    svg += `<text x="${x2 - 30}" y="45" font-size="16" fill="${color}" font-weight="bold">-${operacion.num2}</text>`;
                }
            }
            
            svg += `</svg>`;
            return svg;
        }

        function renderEjercicios() {
            const container = document.getElementById("ejercicios-container");
            let html = "";
            
            ejercicios.forEach((ej, idx) => {
                const respuesta = calcularRespuesta(ej);
                const signo = ej.tipo === "suma" ? "+" : "-";
                const colorSigno = ej.tipo === "suma" ? "#667eea" : "#f97316";
                
                html += `
                    <div class="ejercicio">
                        <div class="ejercicio-header">
                            <span class="ejercicio-numero">Ejercicio ${idx + 1}</span>
                            <span class="operacion" style="border-color: ${colorSigno}; color: ${colorSigno};">
                                ${ej.num1} ${signo} ${ej.num2} = ?
                            </span>
                        </div>
                        
                        <div class="recta-container">
                            <div id="recta-${idx}">
                                ${crearRecta(ej, idx, false)}
                            </div>
                        </div>
                        
                        <div class="opciones" id="opciones-${idx}">
                            ${[...Array(11)].map((_, num) => `
                                <button class="numero-btn" onclick="seleccionar(${idx}, ${num})" id="btn-${idx}-${num}">
                                    ${num}
                                </button>
                            `).join('')}
                        </div>
                        
                        <div class="feedback" id="feedback-${idx}"></div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        function seleccionar(idx, num) {
            const respuesta = calcularRespuesta(ejercicios[idx]);
            const feedback = document.getElementById(`feedback-${idx}`);
            const btn = document.getElementById(`btn-${idx}-${num}`);
            
            respuestas[idx] = num;
            
            if (num === respuesta) {
                btn.classList.add("correcto");
                feedback.classList.remove("incorrecto");
                feedback.classList.add("correcto");
                feedback.textContent = "✓ ¡Correcto! ¡Excelente trabajo!";
                
                // Dibujar las curvas en la recta
                const rectaDiv = document.getElementById(`recta-${idx}`);
                rectaDiv.innerHTML = crearRecta(ejercicios[idx], idx, true);
                
                // Desabilitar otros botones
                for (let i = 0; i <= 10; i++) {
                    if (i !== num) {
                        document.getElementById(`btn-${idx}-${i}`).disabled = true;
                        document.getElementById(`btn-${idx}-${i}`).style.opacity = "0.5";
                    }
                }
            } else {
                btn.classList.add("incorrecto");
                feedback.classList.remove("correcto");
                feedback.classList.add("incorrecto");
                feedback.textContent = "✗ Intenta de nuevo. ¡Puedes lograrlo!";
                
                // Permitir reintentar
                setTimeout(() => {
                    btn.classList.remove("incorrecto");
                    feedback.textContent = "";
                    feedback.classList.remove("incorrecto");
                }, 1000);
            }
        }

        function mostrarResultados() {
            let correctas = 0;
            
            for (let i = 0; i < ejercicios.length; i++) {
                const respuesta = calcularRespuesta(ejercicios[i]);
                if (respuestas[i] === respuesta) {
                    correctas++;
                }
            }
            
            const puntuacion = document.getElementById("puntuacion");
            const puntuacionTexto = document.getElementById("puntuacion-texto");
            
            let mensaje = `Respondiste correctamente ${correctas} de ${ejercicios.length} ejercicios.`;
            
            if (correctas === ejercicios.length) {
                mensaje += " ¡Eres una ESTRELLA! 🌟";
            } else if (correctas >= ejercicios.length * 0.8) {
                mensaje += " ¡Muy bien hecho! 🎉";
            } else if (correctas >= ejercicios.length * 0.6) {
                mensaje += " ¡Buen trabajo! Sigue practicando. 💪";
            } else {
                mensaje += " No te desanimes, ¡practica más! 📚";
            }
            
            puntuacionTexto.textContent = mensaje;
            puntuacion.style.display = "block";
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function generarNuevosEjercicios() {
            // Generar nuevos ejercicios
            ejercicios.length = 0;
            ejercicios.push(...generarEjercicios());
            
            // Limpiar respuestas anteriores
            respuestas = {};
            
            // Ocultar puntuación
            document.getElementById("puntuacion").style.display = "none";
            
            // Re-renderizar
            renderEjercicios();
            
            // Scroll al inicio
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        // Iniciar
        renderEjercicios();
    </script>
</body>
</html>
